<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Customer Hub Reports</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', -apple-system, sans-serif; background: #f5f4f0; color: #1a1a18; padding: 48px 24px; }
  .wrap { max-width: 720px; margin: 0 auto; }
  h1 { font-size: 1.6rem; font-weight: 700; margin-bottom: 6px; }
  p.sub { font-size: 0.85rem; color: #888; margin-bottom: 32px; }
  .list { display: flex; flex-direction: column; gap: 12px; }
  a.client { display: block; background: #fff; border: 1px solid #ece9e3; border-radius: 12px; padding: 18px 20px; text-decoration: none; color: #1a1a18; transition: border-color .15s; }
  a.client:hover { border-color: #999; }
  a.client .name { font-size: 1rem; font-weight: 700; }
  a.client .meta { font-size: 0.78rem; color: #999; margin-top: 4px; }
</style>
</head>
<body>
  <div class="wrap">
    <h1>Customer Hub Reports</h1>
    <p class="sub">Relatórios de performance por cliente</p>
    <div class="list">
      <a class="client" href="/clientes/busta-amaral/">
        <div class="name">Busta &amp; Amaral Advogados</div>
        <div class="meta">Google Ads · Meta Ads · Search Console · Jan–Jun/2026</div>
      </a>
    </div>
  </div>
</body>
</html>
